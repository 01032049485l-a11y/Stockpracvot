name: Intraday Signal Check

on:
  schedule:
    # 한국 장중(09:00~15:30 KST = 00:00~06:30 UTC) 평일 10분 간격
    # 오전 매수 알림만 사용 -> 09:00~12:00 KST = 00:00~03:00 UTC 만 실행 (Actions 사용량 절약)
    # 3,13,23,33,43,53분에 실행 (정각/10분단위는 GitHub 전역 부하로 스케줄 누락 위험이 커서 회피)
    - cron: '3,13,23,33,43,53 0-3 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests

      - name: Run realtime check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python realtime_check.py

      - name: Commit alert state
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add alerted.json || true
          git commit -m "alert state" || echo "no changes"
          git push || true
