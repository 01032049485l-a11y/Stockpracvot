name: Daily Full Market Scan

on:
  schedule:
    # 매 평일 한국시간 08:07 (UTC 23:07 전날) - 장 시작 전 전체 스캔
    # + 08:37 백업 트리거 (GitHub의 정각 부하로 스케줄이 누락될 경우 대비, 이미 실행됐으면 자동으로 건너뜀)
    - cron: '7 23 * * 0-4'
    - cron: '37 23 * * 0-4'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests

      - name: Run daily scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_scan.py

      - name: Commit candidates
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add candidates.json || true
          git add today_picks.json || true
          git commit -m "daily scan $(date +%F)" || echo "no changes"
          git push
