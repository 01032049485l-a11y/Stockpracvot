name: Daily Full Market Scan

on:
  schedule:
    # 매 평일 한국시간 오전 8:10 (UTC 23:10 전날) - 장 시작 전 전체 스캔
    - cron: '10 23 * * 0-4'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests

      - name: Run daily scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_scan.py

      - name: Commit candidates
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add candidates.json
          git commit -m "daily scan $(date +%F)" || echo "no changes"
          git push
