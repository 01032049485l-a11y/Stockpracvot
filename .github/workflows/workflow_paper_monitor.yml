name: Paper Trade Monitor

on:
  schedule:
    # 평일 09:05~15:15 KST = 00:05~06:15 UTC, 10분 간격
    - cron: '3,13,23,33,43,53 0-6 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests
      - name: Run paper monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python paper_monitor.py
      - name: Commit portfolio
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add paper_portfolio.json || true
          git commit -m "paper monitor update" || echo "no changes"
          git push || true
