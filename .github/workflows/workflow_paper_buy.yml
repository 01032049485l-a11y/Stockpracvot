name: Paper Trade Buy

on:
  schedule:
    # 평일 한국시간 09:07 (UTC 00:07) - 정각을 피해 스케줄 누락 가능성 감소
    - cron: '7 0 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  buy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests
      - name: Run paper buy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_buy.py
      - name: Commit portfolio
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add paper_portfolio.json || true
          git commit -m "paper buy $(date +%F)" || echo "no changes"
          git push || true
