name: Paper Trade EOD Close

on:
  schedule:
    # 평일 한국시간 15:23 (UTC 06:23) + 15:43 백업 트리거
    - cron: '23 6 * * 1-5'
    - cron: '43 6 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests
      - name: Run EOD close
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_eod_close.py
      - name: Commit portfolio
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add paper_portfolio.json || true
          git add eod_marker.json || true
          git commit -m "paper eod close $(date +%F)" || echo "no changes"
          git push || true
