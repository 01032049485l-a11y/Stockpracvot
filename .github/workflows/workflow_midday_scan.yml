name: Midday Recheck

on:
  schedule:
    # 매 평일 한국시간 낮 12:33 (UTC 03:33) + 13:03 백업 트리거
    - cron: '33 3 * * 1-5'
    - cron: '3 4 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  midday:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install finance-datareader pandas numpy requests

      - name: Run midday scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python midday_scan.py

      - name: Commit marker
        run: |
          git config user.name "stockbot"
          git config user.email "stockbot@users.noreply.github.com"
          git add midday_marker.json || true
          git commit -m "midday scan $(date +%F)" || echo "no changes"
          git push || true
